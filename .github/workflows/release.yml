name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Least privilege at the top level; each job opts into exactly what it needs.
permissions:
  contents: read

jobs:
  # ===========================================
  # Build and Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw verify

  # ===========================================
  # Build Native Binaries
  # ===========================================
  build-native:
    name: Build Native (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
            artifact: mcp-sessionize-macos-arm64
          - os: macos-15
            name: macos-x64
            artifact: mcp-sessionize-macos-x64
          - os: ubuntu-latest
            name: linux-x64
            artifact: mcp-sessionize-linux-x64
          - os: windows-latest
            name: windows-x64
            artifact: mcp-sessionize-windows-x64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Build native image
        run: ./mvnw package -Pnative -DskipTests

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/*-runner target/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: move target\*-runner.exe target\${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.artifact }}

  # ===========================================
  # Create GitHub Release
  # ===========================================
  release:
    name: Create Release
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release and upload assets
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Set version and build JAR
        run: |
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false
          ./mvnw package -DskipTests -Dquarkus.package.jar.type=uber-jar
          mv target/*-runner.jar target/mcp-sessionize.jar

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp target/mcp-sessionize.jar release/
          cp artifacts/mcp-sessionize-macos-arm64/mcp-sessionize-macos-arm64 release/
          cp artifacts/mcp-sessionize-macos-x64/mcp-sessionize-macos-x64 release/
          cp artifacts/mcp-sessionize-linux-x64/mcp-sessionize-linux-x64 release/
          cp artifacts/mcp-sessionize-windows-x64.exe/mcp-sessionize-windows-x64.exe release/
          chmod +x release/mcp-sessionize-*
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            release/mcp-sessionize.jar
            release/mcp-sessionize-macos-arm64
            release/mcp-sessionize-macos-x64
            release/mcp-sessionize-linux-x64
            release/mcp-sessionize-windows-x64.exe
          generate_release_notes: true
          body: |
            ## Installation

            ### Via npm (recommended) - No Java required!
            ```bash
            npx mcp-sessionize@${{ steps.version.outputs.version }}
            ```

            ### Via Docker
            ```bash
            docker run -i --rm ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ### Native binaries (no Java required)
            - **macOS ARM64**: `mcp-sessionize-macos-arm64`
            - **macOS x64**: `mcp-sessionize-macos-x64`
            - **Linux x64**: `mcp-sessionize-linux-x64`
            - **Windows x64**: `mcp-sessionize-windows-x64.exe`

            ### Via JAR (requires Java 25+)
            ```bash
            java -jar mcp-sessionize.jar
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Build and Push Docker Image
  # ===========================================
  docker:
    name: Publish Docker Image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push image to ghcr.io
      security-events: write   # upload Trivy results to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan published image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'   # report-only; findings appear in the Security tab

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-image.sarif

  # ===========================================
  # Publish to npm (5 packages: 1 main + 4 platform-specific)
  # ===========================================
  npm:
    name: Publish to npm
    needs: [release, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # mint OIDC token for npm provenance (SLSA)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Create platform packages and copy binaries
        run: |
          VERSION=${{ needs.release.outputs.version }}

          # Platform configurations: npm_name, artifact_name, os, cpu
          declare -a PLATFORMS=(
            "mcp-sessionize-darwin-arm64:mcp-sessionize-macos-arm64:darwin:arm64"
            "mcp-sessionize-darwin-x64:mcp-sessionize-macos-x64:darwin:x64"
            "mcp-sessionize-linux-x64:mcp-sessionize-linux-x64:linux:x64"
            "mcp-sessionize-windows-x64:mcp-sessionize-windows-x64.exe:win32:x64"
          )

          for PLATFORM in "${PLATFORMS[@]}"; do
            IFS=':' read -r NPM_NAME ARTIFACT_NAME OS CPU <<< "$PLATFORM"

            echo "Creating package: $NPM_NAME"
            mkdir -p npm/$NPM_NAME/bin

            # Copy binary
            if [[ "$OS" == "win32" ]]; then
              cp artifacts/$ARTIFACT_NAME/$ARTIFACT_NAME npm/$NPM_NAME/bin/$NPM_NAME.exe
            else
              cp artifacts/$ARTIFACT_NAME/$ARTIFACT_NAME npm/$NPM_NAME/bin/$NPM_NAME
              chmod +x npm/$NPM_NAME/bin/$NPM_NAME
            fi

            # Generate package.json for platform package
            cat > npm/$NPM_NAME/package.json << EOF
          {
            "name": "$NPM_NAME",
            "version": "$VERSION",
            "description": "MCP Server for Sessionize Event Data - $OS $CPU binary",
            "repository": {
              "type": "git",
              "url": "https://github.com/jeanlopezxyz/mcp-sessionize"
            },
            "os": ["$OS"],
            "cpu": ["$CPU"],
            "author": "Jean Lopez",
            "license": "Apache-2.0"
          }
          EOF
          done

      - name: Create main package
        run: |
          VERSION=${{ needs.release.outputs.version }}

          # Generate package.json for main package with optionalDependencies
          cat > npm/mcp-sessionize/package.json << EOF
          {
            "name": "mcp-sessionize",
            "version": "$VERSION",
            "description": "MCP Server for Sessionize Event Data - Access speakers, sessions, and schedules",
            "main": "./bin/index.js",
            "bin": {
              "mcp-sessionize": "bin/index.js"
            },
            "optionalDependencies": {
              "mcp-sessionize-darwin-arm64": "$VERSION",
              "mcp-sessionize-darwin-x64": "$VERSION",
              "mcp-sessionize-linux-x64": "$VERSION",
              "mcp-sessionize-windows-x64": "$VERSION"
            },
            "keywords": [
              "mcp",
              "sessionize",
              "conference",
              "speakers",
              "sessions",
              "schedule",
              "claude",
              "ai"
            ],
            "repository": {
              "type": "git",
              "url": "https://github.com/jeanlopezxyz/mcp-sessionize"
            },
            "author": "Jean Lopez",
            "license": "Apache-2.0",
            "homepage": "https://github.com/jeanlopezxyz/mcp-sessionize#readme"
          }
          EOF

          # Copy LICENSE and README to main package
          cp LICENSE npm/mcp-sessionize/ || echo "No LICENSE file found"
          cp README.md npm/mcp-sessionize/ || echo "No README file found"

          # Generate the bin launcher that resolves and spawns the platform-specific
          # native binary. Without this file the published package has no runnable bin,
          # so `npx mcp-sessionize` fails with "command not found".
          mkdir -p npm/mcp-sessionize/bin
          cat > npm/mcp-sessionize/bin/index.js << 'INDEXEOF'
          #!/usr/bin/env node

          const childProcess = require('child_process');

          const BINARY_MAP = {
            darwin_arm64: {name: 'mcp-sessionize-darwin-arm64', suffix: ''},
            darwin_x64: {name: 'mcp-sessionize-darwin-x64', suffix: ''},
            linux_x64: {name: 'mcp-sessionize-linux-x64', suffix: ''},
            win32_x64: {name: 'mcp-sessionize-windows-x64', suffix: '.exe'},
          };

          const resolveBinaryPath = () => {
            try {
              const binary = BINARY_MAP[`${process.platform}_${process.arch}`];
              if (!binary) {
                throw new Error(`Unsupported platform: ${process.platform}/${process.arch}`);
              }
              return require.resolve(`${binary.name}/bin/${binary.name}${binary.suffix}`);
            } catch (e) {
              throw new Error(`Could not resolve binary path for platform/arch: ${process.platform}/${process.arch}`);
            }
          };

          const child = childProcess.spawn(resolveBinaryPath(), process.argv.slice(2), {
            stdio: 'inherit',
            env: process.env,
          });

          const handleSignal = (signal) => {
            if (child && !child.killed) {
              child.kill(signal);
            }
          };

          ['SIGTERM', 'SIGINT', 'SIGHUP'].forEach((signal) => {
            process.on(signal, () => handleSignal(signal));
          });

          child.on('close', (code, signal) => {
            if (signal) {
              process.exit(128 + (signal === 'SIGTERM' ? 15 : signal === 'SIGINT' ? 2 : 1));
            } else {
              process.exit(code || 0);
            }
          });
          INDEXEOF
          chmod +x npm/mcp-sessionize/bin/index.js

          # Sanity check: fail the release if the launcher is missing
          test -f npm/mcp-sessionize/bin/index.js || { echo "ERROR: bin/index.js missing"; exit 1; }

      - name: Publish platform packages
        run: |
          for PKG in mcp-sessionize-darwin-arm64 mcp-sessionize-darwin-x64 mcp-sessionize-linux-x64 mcp-sessionize-windows-x64; do
            echo "Publishing $PKG..."
            cd npm/$PKG
            npm publish --provenance --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm/mcp-sessionize
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
