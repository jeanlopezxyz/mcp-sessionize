version: 2
updates:
  # Keep GitHub Actions up to date (and, once SHA-pinned, bump the pins safely).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Watch Maven dependencies for security advisories and updates.
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
    open-pull-requests-limit: 5
